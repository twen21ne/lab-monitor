name: LAB Monitor

on:
  schedule:
    # Каждые 15 минут (UTC). GitHub Actions иногда задерживает запуск на пару минут при нагрузке — это нормально.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # позволяет запустить вручную кнопкой "Run workflow" на GitHub

permissions:
  contents: write  # нужно, чтобы workflow мог закоммитить обновлённый state.json обратно в репозиторий

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "lab-monitor-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
